<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SEPTA Block Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #21262d;
    --border-light: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #484f58;
    --accent: #58a6ff;
    --accent-dim: rgba(88,166,255,0.12);
    --green: #3fb950;
    --green-dim: rgba(63,185,80,0.12);
    --yellow: #d29922;
    --yellow-dim: rgba(210,153,34,0.12);
    --red: #f85149;
    --red-dim: rgba(248,81,73,0.12);
    --purple: #bc8cff;
    --purple-dim: rgba(188,140,255,0.12);
    --you-glow: rgba(88,166,255,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .header {
    padding: 16px 16px 14px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 30px; height: 30px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), #bc8cff);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px; color: #fff;
  }
  .brand-text { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
  .brand-sub { font-size: 9px; color: var(--text-faint); letter-spacing: 0.06em; font-weight: 500; }
  .status-area { display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; }
  .live-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .live-dot.syncing { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1s infinite; }
  .live-dot.off { background: var(--text-faint); }
  .status-text { font-size: 10px; color: var(--text-faint); font-weight: 500; }

  .input-row { display: flex; gap: 6px; }
  .route-input {
    width: 64px; background: var(--card); border: 1.5px solid var(--border-light);
    border-radius: 9px; padding: 10px 8px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    color: var(--purple); text-align: center;
    outline: none; caret-color: var(--purple); transition: border-color 0.2s;
  }
  .route-input::placeholder { color: var(--text-faint); font-weight: 500; font-size: 11px; }
  .route-input:focus { border-color: var(--purple); }
  .block-input {
    flex: 1; background: var(--card); border: 1.5px solid var(--border-light);
    border-radius: 9px; padding: 10px 12px;
    font-family: inherit; font-size: 18px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.1em; text-align: center;
    outline: none; caret-color: var(--accent); transition: border-color 0.2s;
  }
  .block-input::placeholder { color: var(--text-faint); font-weight: 500; letter-spacing: 0.02em; font-size: 13px; }
  .block-input:focus { border-color: var(--accent); }
  .go-btn {
    width: 46px; border-radius: 9px; border: none;
    background: var(--accent); color: #0d1117;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .go-btn:active { opacity: 0.7; }

  .route-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .route-label { font-size: 12px; font-weight: 600; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .route-num { background: var(--accent-dim); color: var(--accent); padding: 2px 8px; border-radius: 5px; font-weight: 800; font-size: 13px; }
  .bus-count { font-size: 11px; color: var(--text-faint); }
  .refresh-tag { font-size: 10px; color: var(--text-faint); font-weight: 500; }

  .timeline-wrap { padding: 20px 16px 100px; }
  .timeline { position: relative; display: flex; flex-direction: column; }
  .timeline::before {
    content: ''; position: absolute;
    left: 20px; top: 0; bottom: 0;
    width: 2px; background: var(--border-light); border-radius: 1px;
  }

  .bus-node { position: relative; padding: 0 0 0 48px; margin-bottom: 4px; }
  .bus-node::before {
    content: ''; position: absolute;
    left: 14px; top: 16px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--border-light); border: 2px solid var(--bg); z-index: 2;
  }
  .bus-node.leader::before { background: var(--green); }
  .bus-node.follower::before { background: var(--purple); }
  .bus-node.you::before {
    width: 18px; height: 18px; left: 12px; top: 14px;
    background: var(--accent);
    box-shadow: 0 0 10px var(--you-glow), 0 0 20px var(--you-glow);
    border-color: var(--accent);
  }

  .node-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; transition: all 0.2s;
  }
  .bus-node.you .node-card {
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--you-glow), inset 0 0 20px rgba(88,166,255,0.04);
    background: linear-gradient(135deg, rgba(88,166,255,0.06), var(--card));
  }

  .node-row1 { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .role-tag {
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .role-tag.leader { background: var(--green-dim); color: var(--green); }
  .role-tag.follower { background: var(--purple-dim); color: var(--purple); }
  .role-tag.you { background: var(--accent-dim); color: var(--accent); }

  .dir-tag {
    font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
    background: var(--border); color: var(--text-dim);
  }
  .block-num { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: 0.06em; }
  .bus-node.you .block-num { color: var(--accent); }

  .vehicle-tag {
    display: flex; align-items: center; gap: 3px;
    font-size: 9px; color: var(--text-faint); font-weight: 500; margin-left: auto;
  }
  .vehicle-tag svg { width: 11px; height: 11px; fill: currentColor; }

  .node-row2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .late-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .late-tag.ontime { background: var(--green-dim); color: var(--green); }
  .late-tag.mild { background: var(--yellow-dim); color: var(--yellow); }
  .late-tag.bad { background: var(--red-dim); color: var(--red); }

  .seat-tag {
    font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
    display: flex; align-items: center; gap: 3px;
  }
  .seat-tag svg { width: 10px; height: 10px; fill: currentColor; }
  .seat-tag.many { background: var(--green-dim); color: var(--green); }
  .seat-tag.few { background: var(--yellow-dim); color: var(--yellow); }
  .seat-tag.standing { background: var(--red-dim); color: var(--red); }
  .seat-tag.full { background: var(--red-dim); color: var(--red); }
  .seat-tag.na { background: var(--border); color: var(--text-faint); }

  .section-label {
    padding: 6px 0 6px 48px;
    font-size: 10px; font-weight: 600; color: var(--text-faint);
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  .msg { text-align: center; padding: 50px 20px; color: var(--text-dim); }
  .msg .icon { font-size: 32px; margin-bottom: 10px; }
  .msg .main { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  .msg .sub { font-size: 11px; color: var(--text-faint); line-height: 1.6; }

  .err-box {
    margin: 12px 16px; background: var(--red-dim);
    border: 1px solid rgba(248,81,73,0.2); border-radius: 9px;
    padding: 10px 14px; font-size: 11px; color: #fca5a5;
  }

  .debug {
    margin: 6px 16px; background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: 9px; color: var(--text-faint);
    font-family: 'SF Mono', monospace; max-height: 100px; overflow-y: auto;
  }

  .hidden { display: none !important; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeIn 0.2s ease-out both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="brand">
      <div class="brand-icon">BT</div>
      <div>
        <div class="brand-text">Block Tracker</div>
        <div class="brand-sub">SEPTA BUS OPERATORS</div>
      </div>
    </div>
    <div class="status-area">
      <span id="statusDot" class="live-dot off"></span>
      <span id="statusText" class="status-text">IDLE</span>
    </div>
  </div>
  <div class="input-row">
    <input type="text" id="routeInput" class="route-input" placeholder="Rte" maxlength="4" autocomplete="off">
    <input type="text" id="blockInput" class="block-input" placeholder="Block #" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <button class="go-btn" onclick="startTracking()">▶</button>
  </div>
</div>

<div id="routeBar" class="route-bar hidden">
  <div class="route-label">Route <span id="routeNum" class="route-num">—</span> <span id="busCount" class="bus-count"></span></div>
  <span id="refreshTag" class="refresh-tag">—</span>
</div>

<div id="debugBox" class="debug hidden"></div>
<div id="content">
  <div class="msg">
    <div class="icon">🚌</div>
    <div class="main">Enter your Route & Block #</div>
    <div class="sub">Your bus will appear in the center<br>with leaders above and followers below</div>
  </div>
</div>

<script>
var myBlock = "";
var myRoute = "";
var isLoading = false;
var autoTimer = null;
var cdTimer = null;
var refreshSec = 30;
var lastUpdate = null;
var busList = [];
var debugMode = true; // shows debug panel

var blockInput = document.getElementById("blockInput");
var routeInput = document.getElementById("routeInput");

// Restore saved
try {
  var sb = localStorage.getItem("septa_block");
  var sr = localStorage.getItem("septa_route");
  if (sb) blockInput.value = sb;
  if (sr) routeInput.value = sr;
} catch(e) {}

blockInput.addEventListener("input", function(e) {
  e.target.value = e.target.value.replace(/\D/g, "").slice(0, 4);
});
routeInput.addEventListener("input", function(e) {
  e.target.value = e.target.value.replace(/[^a-zA-Z0-9]/g, "").slice(0, 4).toUpperCase();
});
blockInput.addEventListener("keydown", function(e) { if (e.key === "Enter") startTracking(); });
routeInput.addEventListener("keydown", function(e) { if (e.key === "Enter") startTracking(); });

function dbg(msg) {
  if (!debugMode) return;
  var el = document.getElementById("debugBox");
  el.classList.remove("hidden");
  var t = new Date();
  var ts = t.getHours() + ":" + String(t.getMinutes()).padStart(2,"0") + ":" + String(t.getSeconds()).padStart(2,"0");
  el.innerHTML += ts + " " + esc(msg) + "<br>";
  el.scrollTop = el.scrollHeight;
}

function startTracking() {
  var block = blockInput.value.trim();
  var route = routeInput.value.trim();

  if (!block || block.length < 3) {
    showMsg("⚠️", "Enter your Block #", "Your 4-digit block number is required");
    return;
  }
  if (!route) {
    showMsg("⚠️", "Enter your Route", "Route is needed (e.g. 21, 23, G, LUCY)");
    return;
  }

  myBlock = block;
  myRoute = route;
  try {
    localStorage.setItem("septa_block", myBlock);
    localStorage.setItem("septa_route", myRoute);
  } catch(e) {}

  blockInput.blur();
  routeInput.blur();

  clearInterval(autoTimer);
  clearInterval(cdTimer);

  fetchBuses();
  autoTimer = setInterval(fetchBuses, 30000);
  refreshSec = 30;
  cdTimer = setInterval(function() {
    refreshSec--;
    if (refreshSec < 0) refreshSec = 30;
    var el = document.getElementById("refreshTag");
    if (el) el.textContent = "↻ " + refreshSec + "s";
  }, 1000);
}

function fetchBuses() {
  if (isLoading) return;
  isLoading = true;
  setStatus("syncing", "SYNCING");
  dbg("Fetching route=" + myRoute);

  var cbName = "septa_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  var script = document.createElement("script");
  var done = false;

  function cleanup() {
    if (done) return;
    done = true;
    try { delete window[cbName]; } catch(e) {}
    if (script.parentNode) script.parentNode.removeChild(script);
    isLoading = false;
  }

  var timeout = setTimeout(function() {
    if (!done) {
      cleanup();
      setStatus("off", "TIMEOUT");
      showErr("Timed out after 12s. Try again.");
      dbg("TIMEOUT");
    }
  }, 12000);

  window[cbName] = function(data) {
    clearTimeout(timeout);
    dbg("Response received, type=" + typeof data + " isArray=" + Array.isArray(data));

    try {
      var buses = [];

      // Log raw structure for debugging
      try {
        var sample = JSON.stringify(data).slice(0, 300);
        dbg("RAW: " + sample);
      } catch(e2) { dbg("Could not stringify raw data"); }

      if (Array.isArray(data)) {
        dbg("Array length: " + data.length);
        for (var di = 0; di < data.length; di++) {
          var item = data[di];
          if (item && typeof item === "object") {
            var keys = Object.keys(item);
            dbg("Item[" + di + "] keys: " + keys.join(", "));
            // Check each key - could be "bus", route number, or anything
            for (var ki = 0; ki < keys.length; ki++) {
              var val = item[keys[ki]];
              if (Array.isArray(val)) {
                dbg("Key '" + keys[ki] + "' is array, length=" + val.length);
                buses = buses.concat(val);
              }
              // Single bus object at top level of array
              else if (item.BlockID || item.lat) {
                buses.push(item);
                break; // Don't double-add
              }
            }
          }
        }
      } else if (data && typeof data === "object") {
        var topKeys = Object.keys(data);
        dbg("Object keys: " + topKeys.join(", "));
        for (var ti = 0; ti < topKeys.length; ti++) {
          var tval = data[topKeys[ti]];
          if (Array.isArray(tval)) {
            buses = buses.concat(tval);
          }
        }
      }

      dbg("Total buses extracted: " + buses.length);
      if (buses.length > 0) {
        dbg("First bus keys: " + Object.keys(buses[0]).join(", "));
        dbg("First bus BlockID=" + buses[0].BlockID + " VehicleID=" + buses[0].VehicleID + " Dir=" + buses[0].Direction);
      }

      busList = buses;
      lastUpdate = new Date();
      refreshSec = 30;
      setStatus("live", "LIVE · " + lastUpdate.toLocaleTimeString());
      renderTimeline();

    } catch(e) {
      dbg("ERROR: " + e.message);
      setStatus("off", "ERROR");
      showErr("Parse error: " + e.message);
    }
    cleanup();
  };

  script.src = "https://www3.septa.org/hackathon/TransitView/?route=" + encodeURIComponent(myRoute) + "&callback=" + cbName;
  dbg("URL: " + script.src);

  script.onerror = function() {
    clearTimeout(timeout);
    cleanup();
    dbg("Script load error (network/CORS)");
    setStatus("off", "OFFLINE");
    showErr("Can't reach SEPTA API. Check connection.");
  };

  document.head.appendChild(script);
  if (!lastUpdate) showMsg("🔍", "Searching...", "Looking for Block " + esc(myBlock) + " on Route " + esc(myRoute));
}

function renderTimeline() {
  var buses = busList;
  dbg("Render: " + buses.length + " buses, looking for block " + myBlock);

  if (buses.length === 0) {
    document.getElementById("routeBar").classList.add("hidden");
    showMsg("🚌", "No buses on Route " + esc(myRoute), "Route may not be running right now");
    return;
  }

  // Find my bus by BlockID
  var myBus = null;
  var myBusIdx = -1;
  for (var i = 0; i < buses.length; i++) {
    var bid = String(buses[i].BlockID || buses[i].label || "");
    if (bid === myBlock) { myBus = buses[i]; myBusIdx = i; break; }
  }

  dbg("My bus found: " + (myBus ? "YES dir=" + myBus.Direction + " seq=" + myBus.next_stop_sequence : "NO"));

  // Show route bar
  document.getElementById("routeBar").classList.remove("hidden");
  document.getElementById("routeNum").textContent = myRoute;

  if (!myBus) {
    var activeBlocks = [];
    buses.forEach(function(b) { activeBlocks.push(b.BlockID || b.label || "?"); });
    document.getElementById("busCount").textContent = buses.length + " buses active";
    showMsg("⚠️", "Block " + esc(myBlock) + " not found on Route " + esc(myRoute),
      "Active blocks:<br><b style='color:var(--accent);font-size:12px;letter-spacing:0.05em;line-height:2'>" +
      activeBlocks.join(" &middot; ") + "</b><br><br><span style='font-size:10px'>Try one of the blocks above</span>");
    return;
  }

  var myDir = myBus.Direction;

  // Filter same direction, sort by stop_sequence DESC (highest = furthest ahead = leader)
  var sameDir = buses.filter(function(b) { return b.Direction === myDir; });
  sameDir.sort(function(a, b) { return (b.next_stop_sequence || 0) - (a.next_stop_sequence || 0); });

  // Find my position in sorted same-dir list
  var myPos = -1;
  for (var j = 0; j < sameDir.length; j++) {
    var bid2 = String(sameDir[j].BlockID || sameDir[j].label || "");
    if (bid2 === myBlock) { myPos = j; break; }
  }

  var leaders = sameDir.slice(0, myPos);
  var me = sameDir[myPos];
  var followers = sameDir.slice(myPos + 1);

  document.getElementById("busCount").textContent = buses.length + " total · " + sameDir.length + " " + fmtDir(myDir);

  dbg("Leaders: " + leaders.length + ", Followers: " + followers.length);

  // Build HTML
  var html = '<div class="timeline-wrap"><div class="timeline">';

  if (leaders.length > 0) {
    html += '<div class="section-label fade-in">↑ Ahead · ' + leaders.length + '</div>';
  }

  var allNodes = [];
  leaders.forEach(function(b, i) { allNodes.push({bus: b, role: "leader", origIdx: i}); });
  allNodes.push({bus: me, role: "you", origIdx: leaders.length});
  followers.forEach(function(b, i) { allNodes.push({bus: b, role: "follower", origIdx: leaders.length + 1 + i}); });

  allNodes.forEach(function(node, idx) {
    var bus = node.bus;
    var role = node.role;
    var late = parseInt(bus.late) || 0;
    var lateClass = late === 0 ? "ontime" : late > 5 ? "bad" : "mild";
    var lateText = late === 0 ? "On Time" : "+" + late + "m";
    var seat = seatInfo(bus.estimated_seat_availability);
    var dir = dirShort(bus.Direction);
    var blk = bus.BlockID || bus.label || "—";
    var vid = bus.VehicleID || bus.label || "—";

    // Section label before YOU
    if (role === "you" && leaders.length > 0) {
      html += '<div class="section-label fade-in" style="padding-top:2px">● YOU</div>';
    }

    html += '<div class="bus-node ' + role + ' fade-in" style="animation-delay:' + (idx * 0.03) + 's">';
    html += '<div class="node-card">';

    html += '<div class="node-row1">';
    html += '<span class="role-tag ' + role + '">' + roleText(role, node.origIdx, leaders.length) + '</span>';
    html += '<span class="dir-tag">' + dir + '</span>';
    html += '<span class="block-num">' + esc(blk) + '</span>';
    html += '<span class="vehicle-tag">' + busIcon() + ' ' + esc(vid) + '</span>';
    html += '</div>';

    html += '<div class="node-row2">';
    html += '<span class="late-tag ' + lateClass + '">' + lateText + '</span>';
    html += '<span class="seat-tag ' + seat.c + '">' + seatIcon() + ' ' + seat.t + '</span>';
    html += '</div>';

    html += '</div></div>';

    // Section label after YOU
    if (role === "you" && followers.length > 0) {
      html += '<div class="section-label fade-in" style="padding-top:4px">↓ Behind · ' + followers.length + '</div>';
    }
  });

  html += '</div></div>';
  document.getElementById("content").innerHTML = html;
}

function roleText(role, idx, leaderCount) {
  if (role === "you") return "YOU";
  if (role === "leader") {
    var dist = leaderCount - idx;
    return dist === 1 ? "LEADER" : "LEADER +" + dist;
  }
  return "FOLLOWER";
}

function fmtDir(d) {
  if (!d) return "";
  var l = d.toLowerCase();
  if (l.indexOf("east") >= 0) return "Eastbound";
  if (l.indexOf("west") >= 0) return "Westbound";
  if (l.indexOf("north") >= 0) return "Northbound";
  if (l.indexOf("south") >= 0) return "Southbound";
  return d;
}

function dirShort(d) {
  if (!d) return "—";
  var l = d.toLowerCase();
  if (l.indexOf("east") >= 0) return "EB";
  if (l.indexOf("west") >= 0) return "WB";
  if (l.indexOf("north") >= 0) return "NB";
  if (l.indexOf("south") >= 0) return "SB";
  return d.slice(0, 2).toUpperCase();
}

function seatInfo(v) {
  var map = {
    MANY_SEATS_AVAILABLE: { t: "Many Seats", c: "many" },
    FEW_SEATS_AVAILABLE: { t: "Few Seats", c: "few" },
    STANDING_ROOM_ONLY: { t: "Standing", c: "standing" },
    FULL: { t: "Full", c: "full" }
  };
  return map[v] || { t: "—", c: "na" };
}

function busIcon() {
  return '<svg viewBox="0 0 24 24"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>';

function setStatus(dot, text) {
  document.getElementById("statusDot").className = "live-dot " + dot;
  document.getElementById("statusText").textContent = text;
}

function showMsg(icon, main, sub) {
  document.getElementById("content").innerHTML =
    '<div class="msg"><div class="icon">' + icon + '</div><div class="main">' + main + '</div><div class="sub">' + sub + '</div></div>';
}

function showErr(msg) {
  document.getElementById("content").innerHTML = '<div class="err-box">' + esc(msg) + '</div>';
}

function esc(s) {
  if (!s) return "";
  var d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
